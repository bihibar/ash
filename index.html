<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ash</title>
    <meta name="description" content="ash — turn images and video into ASCII and vector patterns, right in the browser." />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400..600&family=Geist:wght@400..600&display=swap" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="preview-pane">
        <header class="app-header">
          <div class="brand">
            <img class="brand-logo" src="./ash-logo.svg" alt="ash logo" />
            <div class="brand-text">
              <h1>ash</h1>
              <p class="brand-sub">image &amp; video → ascii</p>
            </div>
          </div>
          <div class="actions">
            <button id="resetSettings" class="ghost-action" type="button" title="Reset all settings to defaults">
              <svg class="btn-icon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 12a9 9 0 1 0 3-6.7L3 8" />
                <path d="M3 3v5h5" />
              </svg>
              Reset
            </button>
            <button id="copySvg" class="primary-action" type="button">Copy SVG</button>
            <details class="export-menu">
              <summary>Export</summary>
              <div class="export-popover">
                <button id="copyPng" type="button">Copy PNG</button>
                <button id="saveSvg" type="button">Save SVG</button>
                <button id="savePng" type="button">Save PNG</button>
                <button id="saveJpg" type="button">Save JPG</button>
                <button id="saveMp4" type="button">Save MP4</button>
              </div>
            </details>
          </div>
        </header>

        <div id="outputFrame" class="output-frame">
          <div class="canvas-shell">
            <div id="svgMount"></div>
            <canvas id="outputCanvas" hidden></canvas>
            <div id="playOverlay" class="play-overlay" aria-hidden="true" hidden>
              <span class="play-overlay-button">
                <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
                  <path d="M8 5v14l11-7z" fill="currentColor" />
                </svg>
              </span>
            </div>
            <div class="drop-hint" aria-hidden="true">Drop image or video</div>
          </div>
        </div>

        <!-- live status kept for screen readers / JS, not visually shown -->
        <p id="status" class="sr-only" role="status" aria-live="polite">Ready.</p>
        <span id="sampleCount" class="sr-only">0 marks</span>
      </section>

      <aside class="controls" aria-label="Pattern controls">
        <label class="upload-button">
          <input id="imageInput" type="file" accept="image/*,video/*" />
          <svg class="btn-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 15V3m0 0L8 7m4-4 4 4" />
            <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" />
          </svg>
          Load Media
        </label>

        <section class="source-panel" aria-label="Source preview">
          <div class="source-panel-header">
            <span>Source</span>
            <div class="source-tools">
              <button id="cropToggle" type="button" class="source-mini-btn">Crop</button>
              <small>Alpha-aware</small>
            </div>
          </div>
          <div id="sourceFrame" class="source-frame">
            <img id="sourcePreview" alt="Loaded source preview" />
            <video id="sourceVideo" muted loop playsinline controls hidden></video>
            <div id="cropOverlay" class="crop-overlay" hidden>
              <div id="cropBox" class="crop-box">
                <span class="crop-handle" data-h="nw"></span>
                <span class="crop-handle" data-h="n"></span>
                <span class="crop-handle" data-h="ne"></span>
                <span class="crop-handle" data-h="e"></span>
                <span class="crop-handle" data-h="se"></span>
                <span class="crop-handle" data-h="s"></span>
                <span class="crop-handle" data-h="sw"></span>
                <span class="crop-handle" data-h="w"></span>
              </div>
            </div>
          </div>
          <div id="cropActions" class="crop-actions" hidden>
            <button id="cropApply" type="button" class="primary-action">Apply</button>
            <button id="cropReset" type="button">Reset</button>
            <button id="cropCancel" type="button">Cancel</button>
          </div>
        </section>

        <details class="control-group" open>
          <summary>Pattern</summary>
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="dots">Dots</option>
            <option value="rings">Ring dots</option>
            <option value="squares">Squares</option>
            <option value="rectangles">Rectangles</option>
            <option value="triangles">Triangles</option>
            <option value="diamonds">Diamonds</option>
            <option value="ascii">ASCII</option>
            <option value="hatch">Line hatch</option>
            <option value="crosshatch">Cross hatch</option>
            <option value="waves">Wave threads</option>
          </select>

          <label for="charset">ASCII charset</label>
          <select id="charset">
            <option value="dotted">Dotted - .,;:oO8@</option>
            <option value="type">Typewriter - .:-=+*#%@</option>
            <option value="binary">Binary - 001101</option>
            <option value="minimal">Minimal - .:+#</option>
            <option value="dense">Dense</option>
          </select>
        </details>

        <details class="control-group" open>
          <summary>Sampling</summary>
          <div class="range-row">
            <label for="resolution">Resolution</label>
            <output id="resolutionValue"></output>
          </div>
          <input id="resolution" type="range" min="24" max="260" value="120" />

          <div class="range-row">
            <label for="brightness">Brightness</label>
            <output id="brightnessValue"></output>
          </div>
          <input id="brightness" type="range" min="-100" max="100" value="0" />

          <div class="range-row">
            <label for="contrast">Contrast</label>
            <output id="contrastValue"></output>
          </div>
          <input id="contrast" type="range" min="20" max="300" value="115" />

          <div class="range-row">
            <label for="gamma">Gamma</label>
            <output id="gammaValue"></output>
          </div>
          <input id="gamma" type="range" min="35" max="240" value="100" />

          <div class="range-row">
            <label for="cutoff">Tone cutoff</label>
            <output id="cutoffValue"></output>
          </div>
          <input id="cutoff" type="range" min="0" max="100" value="6" />

          <div class="range-row">
            <label for="alphaCutoff">Alpha cutoff</label>
            <output id="alphaCutoffValue"></output>
          </div>
          <input id="alphaCutoff" type="range" min="0" max="100" value="4" />
        </details>

        <details class="control-group" open>
          <summary>Geometry</summary>
          <div class="range-row">
            <label for="density">Size</label>
            <output id="densityValue"></output>
          </div>
          <input id="density" type="range" min="20" max="190" value="98" />

          <div class="range-row">
            <label for="xScale">Width</label>
            <output id="xScaleValue"></output>
          </div>
          <input id="xScale" type="range" min="25" max="220" value="100" />

          <div class="range-row">
            <label for="yScale">Height</label>
            <output id="yScaleValue"></output>
          </div>
          <input id="yScale" type="range" min="25" max="220" value="100" />

          <div class="range-row">
            <label for="rotation">Rotation</label>
            <output id="rotationValue"></output>
          </div>
          <input id="rotation" type="range" min="-180" max="180" value="0" />

          <div class="range-row">
            <label for="jitter">Jitter</label>
            <output id="jitterValue"></output>
          </div>
          <input id="jitter" type="range" min="0" max="100" value="0" />

          <div class="range-row">
            <label for="roundness">Roundness</label>
            <output id="roundnessValue"></output>
          </div>
          <input id="roundness" type="range" min="0" max="100" value="14" />

          <label class="check">
            <input id="uniformSize" type="checkbox" />
            Uniform mark size
          </label>
        </details>

        <details class="control-group" open>
          <summary>Color</summary>
          <div class="color-row">
            <label for="inkColor">Ink</label>
            <input id="inkColor" type="color" value="#fafafa" />
          </div>
          <div class="color-row">
            <label for="paperColor">Background</label>
            <input id="paperColor" type="color" value="#0a0a0a" />
          </div>

          <div id="gradientBlock" class="gradient-block">
            <label class="check">
              <input id="useGradient" type="checkbox" />
              Gradient ink fill
            </label>

            <div id="gradientEditor" class="gradient-editor" hidden>
              <div id="gradientBar" class="gradient-bar" title="Click to add a stop"></div>

              <div class="gradient-angle-row">
                <label for="gradientAngle">Angle</label>
                <input id="gradientAngle" type="range" min="0" max="360" value="90" />
                <output id="gradientAngleValue">90°</output>
                <button id="gradientReverse" type="button" class="gradient-mini-btn" title="Reverse stops" aria-label="Reverse stops">⇄</button>
              </div>

              <div class="gradient-stops-head">
                <span>Stops</span>
                <button id="gradientAddStop" type="button" class="gradient-mini-btn" title="Add stop" aria-label="Add stop">+</button>
              </div>
              <div id="gradientStops" class="gradient-stops"></div>
            </div>
          </div>

          <label class="check">
            <input id="sampleColors" type="checkbox" />
            Sample image colors
          </label>
          <label class="check">
            <input id="invert" type="checkbox" />
            Invert tones
          </label>
          <label class="check">
            <input id="transparentPaper" type="checkbox" />
            Transparent export background
          </label>
          <label class="check">
            <input id="photoBackdrop" type="checkbox" />
            Faint source backdrop
          </label>
        </details>
      </aside>
    </main>

    <textarea id="clipboardBuffer" class="clipboard-buffer" aria-label="Copy buffer"></textarea>
    <canvas id="sampler" hidden></canvas>
    <script type="module" src="./app.js"></script>
  </body>
</html>
